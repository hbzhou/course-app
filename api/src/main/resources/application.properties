spring.application.name=course application
server.port=8081

# MySQL DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/coursedb
spring.datasource.username=${DB_USERNAME:${MYSQL_USER:admin}}
spring.datasource.password=${DB_PASSWORD:${MYSQL_PASSWORD:welcome123}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# Since Flyway manages the schema, disable Hibernate DDL
spring.jpa.hibernate.ddl-auto=none
hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# OAuth2 Client Configuration
app.oauth2.default-provider=${APP_OAUTH2_DEFAULT_PROVIDER:azure}
app.oauth2.providers[0].provider-id=azure
app.oauth2.providers[0].display-name=Azure AD
app.oauth2.providers[0].issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/v2.0}
app.oauth2.providers[0].username-claims=preferred_username,upn,email,sub
app.oauth2.providers[0].email-claims=email,preferred_username,upn
app.oauth2.providers[0].role-claims=roles,groups

app.oauth2.providers[1].provider-id=keycloak
app.oauth2.providers[1].display-name=Keycloak
app.oauth2.providers[1].issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/course-app}
app.oauth2.providers[1].username-claims=preferred_username,email,sub
app.oauth2.providers[1].email-claims=email,preferred_username
app.oauth2.providers[1].role-claims=realm_access,resource_access

spring.security.oauth2.client.registration.azure.client-id=${AZURE_CLIENT_ID:course-app}
spring.security.oauth2.client.registration.azure.client-secret=${AZURE_CLIENT_SECRET:change-me}
spring.security.oauth2.client.registration.azure.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.azure.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.azure.scope=openid,profile,email

spring.security.oauth2.client.provider.azure.authorization-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.azure.token-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/oauth2/v2.0/token
spring.security.oauth2.client.provider.azure.jwk-set-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID}/discovery/v2.0/keys
spring.security.oauth2.client.provider.azure.user-name-attribute=preferred_username

spring.security.oauth2.client.registration.keycloak.client-id=course-app
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:course-app-secret}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
app.oauth2.success-url=${OAUTH2_SUCCESS_URL:http://localhost:3000/courses}

spring.security.oauth2.client.provider.keycloak.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/course-app}
spring.security.oauth2.client.provider.keycloak.authorization-uri=${KEYCLOAK_AUTH_URI:http://localhost:8080/realms/course-app/protocol/openid-connect/auth}
spring.security.oauth2.client.provider.keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://localhost:8080/realms/course-app/protocol/openid-connect/token}
spring.security.oauth2.client.provider.keycloak.user-info-uri=${KEYCLOAK_USERINFO_URI:http://localhost:8080/realms/course-app/protocol/openid-connect/userinfo}

# Session Configuration (Redis-backed)
spring.session.store-type=redis
spring.session.redis.namespace=course-app:session
server.servlet.session.timeout=2h
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.name=SESSION
spring.security.oauth2.client.provider.keycloak.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/course-app/protocol/openid-connect/certs}
spring.security.oauth2.client.provider.keycloak.user-name-attribute=preferred_username

# OAuth2 Resource Server Configuration (for JWT token validation)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/course-app}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/course-app/protocol/openid-connect/certs}

# Redis Configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# WebSocket / Notification channel
app.notification.redis-channel=course-app-notifications
app.websocket.allowed-origins=${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000}

# Actuator Configuration
# Expose health endpoints for Kubernetes probes
management.endpoints.web.exposure.include=health,info,metrics
management.endpoints.web.base-path=/actuator
management.endpoint.health.show-details=when-authorized

# Enable Kubernetes-specific health probes
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Group health indicators for different probe purposes
management.endpoint.health.group.liveness.include=livenessState,ping
management.endpoint.health.group.readiness.include=readinessState,db,diskSpace

# Docker Compose Configuration
# Automatically starts docker-compose services when the application runs
# MySQL will keep running even after the app stops (start_only mode)
spring.docker.compose.enabled=true
spring.docker.compose.file=./docker-compose.yml
spring.docker.compose.lifecycle-management=start_only
spring.docker.compose.start.command=up
