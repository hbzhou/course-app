# Minimal test configuration to prevent SecurityConfig constructor injection failures
# Real values are not used (mocks are injected), but properties prevent @Value annotation errors

# OAuth2 Resource Server - required to prevent SecurityConfig constructor failure
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:8080/realms/course-app/protocol/openid-connect/certs
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8080/realms/course-app

# OAuth2 Client - required to prevent SecurityConfig constructor failure  
app.oauth2.success-url=http://localhost:3000

# Redis configuration for test context (not required to start, but prevents warnings)
spring.redis.host=localhost
spring.redis.port=6379

# Datasource for test context (use H2 in-memory database)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
