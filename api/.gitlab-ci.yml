image: eclipse-temurin:25.0.2_10-jdk
variables:
  GRADLE_HOME: ${CI_PROJECT_DIR}/api/gradle_home

.base:
  before_script:
    - mkdir -p $GRADLE_HOME
    - chmod +x ./gradlew
  tags:
    - kubernetes

compile-api:
  extends: .base
  stage: compile
  cache:
    - key: ${CI_PROJECT_NAME}-api
      paths:
        - api/gradle_home
      policy: pull-push
    - key: ${CI_PROJECT_NAME}-api-build-${CI_COMMIT_SHORT_SHA}
      paths:
        - api/build
      policy: pull-push
  script:
    - ./gradlew -g ${GRADLE_HOME} classes testClasses

.api-compiled:
  extends: .base
  needs:
    - compile-api
  cache:
    - key: ${CI_PROJECT_NAME}-api
      paths:
        - api/gradle_home
      policy: pull
    - key: ${CI_PROJECT_NAME}-api-build-${CI_COMMIT_SHORT_SHA}
      paths:
        - api/build
      policy: pull

api-unit-test:
  stage: test
  extends: .api-compiled
  services:
    - name: mysql:8.0
      alias: mysql
    - name: redis:7.2
      alias: redis
    - name: quay.io/keycloak/keycloak:26.0
      alias: keycloak
      command: ["start-dev", "--http-port=8080"]
      variables:
        KEYCLOAK_ADMIN: ${CI_KEYCLOAK_ADMIN}
        KEYCLOAK_ADMIN_PASSWORD: ${CI_KEYCLOAK_ADMIN_PASSWORD}
  variables:
    MYSQL_ROOT_PASSWORD: ${CI_MYSQL_ROOT_PASSWORD}
    MYSQL_DATABASE: coursedb
    MYSQL_USER: ${CI_MYSQL_USER}
    MYSQL_PASSWORD: ${CI_MYSQL_PASSWORD}
    KEYCLOAK_ADMIN: ${CI_KEYCLOAK_ADMIN}
    KEYCLOAK_ADMIN_PASSWORD: ${CI_KEYCLOAK_ADMIN_PASSWORD}
    SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/coursedb
    SPRING_DATASOURCE_USERNAME: ${CI_MYSQL_USER}
    SPRING_DATASOURCE_PASSWORD: ${CI_MYSQL_PASSWORD}
    SPRING_DATA_REDIS_HOST: redis
    SPRING_DATA_REDIS_PORT: 6379
  script:
    - |
      READY=0
      for i in {1..60}; do
        if curl -fsS http://keycloak:8080/ > /dev/null; then
          READY=1
          break
        fi
        sleep 2
      done
      if [ "$READY" -ne 1 ]; then
        echo "Keycloak failed to start in time"
        exit 1
      fi
    - ./gradlew -g ${GRADLE_HOME} :api:test
  artifacts:
    when: on_success
    paths:
      - api/build/reports
      - api/build/test-results
    reports:
      junit:
        - "api/build/test-results/test/*.xml"
    expire_in: 30 days
    expose_as: Test Result Reports

api-build:
    stage: build
    extends: .api-compiled
    needs:
      - api-unit-test
      - compile-ui
    before_script:
      - mkdir -p api/src/main/resources/public
      - cp -r ui/dist/* api/src/main/resources/public/
    script:
      - ./gradlew -g ${GRADLE_HOME} :api:bootJar
    artifacts:
      name: $CI_JOB_NAME-$CI_PIPELINE_ID
      paths:
        - api/build
    when: on_success

api-native-build:
    stage: build
    image: ghcr.io/graalvm/native-image-community:25
    extends: .api-compiled
    needs:
      - api-unit-test
      - compile-ui
    variables:
      KUBERNETES_MEMORY_REQUEST: "4Gi"
      KUBERNETES_MEMORY_LIMIT: "10Gi"
      KUBERNETES_CPU_REQUEST: "2000m"
      KUBERNETES_CPU_LIMIT: "4000m"
    before_script:
      - mkdir -p api/src/main/resources/public
      - cp -r ui/dist/* api/src/main/resources/public/
    script:
      - ./gradlew -g ${GRADLE_HOME} :api:nativeCompile
    artifacts:
      name: $CI_JOB_NAME-$CI_PIPELINE_ID
      paths:
        - api/build
    when: manual
    allow_failure: true