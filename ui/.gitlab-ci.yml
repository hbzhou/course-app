cache:
  - key: ${CI_PROJECT_NAME}-ui
    paths:
      - ui/node_modules
    policy: pull
  - key: ${CI_PROJECT_NAME}-ui-build-${CI_COMMIT_SHORT_SHA}
    paths:
      - ui/dist
    policy: pull

.base-ui:
  image: node:22-slim
  before_script:
    - cd ui
    - npm install
  tags:
    - kubernetes

compile-ui:
  extends: .base-ui
  stage: compile
  cache:
   - key: ${CI_PROJECT_NAME}-ui
     paths:
      - ui/node_modules
     policy: pull-push
   - key: ${CI_PROJECT_NAME}-ui-build-${CI_COMMIT_SHORT_SHA}
     paths:
       - ui/dist
     policy: pull-push
  script:
    - npm run build
  artifacts:
    name: ${CI_JOB_NAME}-${CI_PIPELINE}
    paths:
      - ui/dist/


ui-lint:
  stage: test
  extends: .base-ui
  needs:
    - compile-ui
  script:
    - npm run lint


ui-unit-test:
  extends: .base-ui
  stage: test
  cache:
    - key: ${CI_PROJECT_NAME}-ui
      paths:
        - ui/node_modules
      policy: pull
    - key: ${CI_PROJECT_NAME}-ui-build-${CI_COMMIT_SHORT_SHA}
      paths:
        - ui/dist
      policy: pull
  needs:
    - compile-ui
  script:
    - npm run test
  artifacts:
    name: $CI_JOB_NAME-$CI_PIPELINE_ID
    paths:
      - ui/coverage
      - ui/test-results
    expire_in: 5 days
    expose_as: Test Result Report
    reports:
      junit:
        - ui/test_results/junit.xml


ui-e2e-test:
  extends: .base-ui
  stage: test
  image: mcr.microsoft.com/playwright:v1.48.0-jammy
  cache:
    - key: ${CI_PROJECT_NAME}-ui
      paths:
        - ui/node_modules
      policy: pull
  needs:
    - compile-ui
  before_script:
    - cd ui
    - npx playwright install --with-deps chromium webkit
  script:
    - npm run e2e
  artifacts:
    name: $CI_JOB_NAME-$CI_PIPELINE_ID
    when: always
    paths:
      - ui/test-results/
      - ui/playwright-report/
    expire_in: 5 days
    expose_as: E2E Test Report
    reports:
      junit:
        - ui/test-results/e2e-junit.xml
  retry:
    max: 1
    when: script_failure

